name: Build edge image (GHCR)

# Builds the rolling "edge" image from the latest main commit.
# Versioned/tagged release images (:X.Y.Z, :latest) are normally built by
# release-please.yml. As a manual fallback (e.g. when release-please fails to
# tag), dispatch this workflow with the `version` input to publish the
# versioned + :latest images instead of :edge.
# Pushes to the design branch below publish a branch-named image
# (:geolog) instead — :edge and :latest are never touched from branches.
on:
  push:
    branches:
      - main
      - geolog
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version to publish as :X.Y.Z, :X.Y, :X and :latest (leave empty to build the rolling :edge image).'
        required: false
        default: ''

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run start:build

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=edge,enable=${{ inputs.version == '' && github.ref_name == 'main' }}
            type=raw,value=${{ github.ref_name }},enable=${{ inputs.version == '' && github.ref_name != 'main' }}
            type=semver,pattern={{version}},value=${{ inputs.version }},enable=${{ inputs.version != '' }}
            type=semver,pattern={{major}}.{{minor}},value=${{ inputs.version }},enable=${{ inputs.version != '' }}
            type=semver,pattern={{major}},value=${{ inputs.version }},enable=${{ inputs.version != '' }}
            type=raw,value=latest,enable=${{ inputs.version != '' }}
            type=sha,format=short,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
