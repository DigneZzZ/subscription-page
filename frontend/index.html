<!doctype html>
<html lang="en" dir="ltr">
    <head>
        <meta charset="UTF-8" />
        <meta name="robots" content="noindex, nofollow" />
        <meta name="color-scheme" content="dark only" />
        <meta name="theme-color" content="#0c1210" />
        <meta
            name="viewport"
            content="minimum-scale=1, initial-scale=1, width=device-width, user-scalable=no"
        />
        <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />
        <link rel="icon" sizes="32x32" type="image/png" href="/assets/favicon-32x32.png" />
        <link rel="icon" sizes="16x16" type="image/png" href="/assets/favicon-16x16.png" />
        <link rel="apple-touch-icon" sizes="180x180" href="/assets/favicon-180x180.png" />

        <link rel="preconnect" crossorigin="anonymous" href="https://fonts.googleapis.com" />
        <link rel="preconnect" crossorigin="anonymous" href="https://fonts.gstatic.com" />

        <link
            href="https://fonts.googleapis.com/css2?family=Golos+Text:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Oswald:wght@300;400;500;600;700&display=swap"
            rel="stylesheet"
        />
        <link
            href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@100..900&display=swap"
            rel="stylesheet"
        />
        <link
            href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@100..900&display=swap"
            rel="stylesheet"
        />

        <meta name="description" content="<%- metaDescription %>" />
        <title><%- metaTitle %></title>
    </head>
    <body>
        <div id="root"></div>
        <script type="module" src="./src/main.tsx"></script>

        <div id="sbpg" data-panel="<%- panelData %>"></div>
        <div id="pmt" data-url="<%- paymentUrl %>" data-tariffs="<%- paymentTariffs %>" data-reset="<%- paymentReset %>"></div>
        <div id="sup" data-email="<%- supportEmail %>"></div>
        <div id="hwid" data-hwid="<%- hwidData %>"></div>

        <% if (chatwootBaseUrl && chatwootWebsiteToken) { %>
        <!-- Chatwoot live chat widget -->
        <script>
          (function () {
            try {
              var el = document.getElementById("sbpg");
              if (el && el.dataset && el.dataset.panel) {
                window.__rwPanelData = el.dataset.panel;
              }
            } catch (e) {}
          })();

          (function (d, t) {
            var BASE = "<%- chatwootBaseUrl %>";
            var TOKEN = "<%- chatwootWebsiteToken %>";
            var g = d.createElement(t),
              s = d.getElementsByTagName(t)[0];
            g.src = BASE + "/packs/js/sdk.js";
            g.defer = true;
            g.async = true;
            s.parentNode.insertBefore(g, s);
            g.onload = function () {
              if (!window.chatwootSDK) return;
              window.chatwootSDK.run({ websiteToken: TOKEN, baseUrl: BASE });
            };
          })(document, "script");

          window.addEventListener("chatwoot:ready", function () {
            try {
              var raw = window.__rwPanelData;
              if (!raw) return;
              var data = JSON.parse(atob(raw));
              var u = (data && data.response && data.response.user) || {};
              var uid = u.shortUuid || u.username || "";
              if (!uid) return;
              var IDENTIFIER_HASH = "<%- chatwootIdentifierHash %>";
              var userPayload = {
                name: u.username || u.shortUuid || uid,
                email: u.email || undefined,
                custom_attributes: {
                  short_uuid: u.shortUuid || "",
                  username: u.username || "",
                  status: u.userStatus || "",
                  expires_at: u.expiresAt || "",
                  traffic_used: u.trafficUsed || "",
                  traffic_limit: u.trafficLimit || "",
                  days_left: u.daysLeft != null ? String(u.daysLeft) : "",
                },
              };
              if (IDENTIFIER_HASH) userPayload.identifier_hash = IDENTIFIER_HASH;
              window.$chatwoot.setUser(uid, userPayload);
              window.$chatwoot.setCustomAttributes({ source: "subscription_page" });
            } catch (e) {
              console.warn("Chatwoot setUser failed:", e);
            }
          });
        </script>
        <% } %>
    </body>
</html>
